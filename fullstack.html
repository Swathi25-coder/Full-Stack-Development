<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Travel Web Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        header {
            background-color: #7f1ca3;
            color: white;
            padding: 20px;
        }

        .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container img {
            margin-bottom: 10px;
        }

        .container h2 {
            margin-bottom: 5px;
        }

        nav {
            margin-top: 20px;
            text-align: center;
        }

        nav ul {
            list-style: none;
        }

        nav ul li {
            display: inline-block;
            margin: 0 15px;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        nav ul li a:hover {
            color: yellow;
        }
        card {
            background-color: #f5f5f5;
            padding: 20px;
            margin: 20px 0;
            border-radius: 5px;
        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="container">
        <div class="site-brand">
            <span class="brand-logo">
                <img src="./flight.png" alt="Logo">
            </span>
            <div>
                <div style="font-size:0.9rem; color:#64748b;">Custom domain landing page</div>
            </div>
        </div>
        <nav>
            <a href="#features">Features</a>
            <a class="" href="#projects">Projects</a>
            <a class="primary-cta" href="#contact">Get Started</a>
        </nav>
    </header>

    


</body>

</html>
