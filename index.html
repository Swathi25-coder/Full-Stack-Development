<!DOCTYPE html>
<html lang="en">

<head>
    <!-- meta style link title -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Travel Web Page</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        header {
            background-color: #7f1ca3;
            color: white;
            padding: 20px;
        }

        .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container img {
            margin-bottom: 10px;
        }

        .container h2 {
            margin-bottom: 5px;
        }

        nav {
            margin-top: 20px;
            text-align: center;
        }

        nav ul {
            list-style: none;
        }

        nav ul li {
            display: inline-block;
            margin: 0 15px;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        nav ul li a:hover {
            color: yellow;
        }
    </style>
</head>

<body>
    <!-- Header Section -->
    <header>
    <div class="container">
        <!-- Logo + Website Name -->
        <div>
            <img src="./flight.png" alt="Flight Logo" width="60" height="60">

            <h2>Travel Discovery</h2>

            <p>Explore. Discover. Journey.</p>
        </div>

        <!-- Navigation Menu -->
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Flights</a></li>
                <li><a href="#">Hotels</a></li>
                <li><a href="#">Buses</a></li>
                <li><a href="#">Destinations</a></li>
                <li><a href="#">Offers</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </div>
    </header>

</body>

</html>
